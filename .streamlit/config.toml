[theme]
primaryColor = "#00A3FF"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1C2333"
textColor = "#E8EAF0"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[client]
showErrorDetails = true
toolbarMode = "minimal"

[runner]
fastReruns = true
