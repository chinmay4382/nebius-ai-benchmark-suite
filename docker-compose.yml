name: nebiusbench

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: nebiusbench:latest
    container_name: nebiusbench
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/benchmark_results.db
      - PYTHONPATH=/app
    volumes:
      - bench_data:/app/data
      - bench_reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Standalone benchmark runner (CLI mode)
  runner:
    image: nebiusbench:latest
    container_name: nebiusbench-runner
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/benchmark_results.db
      - PYTHONPATH=/app
    volumes:
      - bench_data:/app/data
      - bench_reports:/app/reports
    profiles:
      - cli
    entrypoint: ["python", "-m", "benchmark.runner"]
    command: []

volumes:
  bench_data:
    driver: local
  bench_reports:
    driver: local
