name: nebiusbench

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: nebiusbench:latest
    container_name: nebiusbench
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=sqlite:////app/data/benchmark_results.db
      - PYTHONPATH=/app
      # IAM token is auto-fetched from Nebius instance metadata service.
      # Uncomment only for local dev outside a Nebius VM:
      # - NEBIUS_API_KEY=your_key_here
    volumes:
      - bench_data:/app/data
      - bench_reports:/app/reports
      # Mount Nebius VM metadata socket if needed
      - /run/metadata:/run/metadata:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  runner:
    image: nebiusbench:latest
    container_name: nebiusbench-runner
    environment:
      - DATABASE_URL=sqlite:////app/data/benchmark_results.db
      - PYTHONPATH=/app
    volumes:
      - bench_data:/app/data
      - bench_reports:/app/reports
    profiles:
      - cli
    entrypoint: ["python", "-m", "benchmark.runner"]
    command: []

volumes:
  bench_data:
    driver: local
  bench_reports:
    driver: local
